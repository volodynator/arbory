name: Test Tauri Secrets

on:
  workflow_dispatch:

jobs:
  test-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check secrets presence
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is missing"
            exit 1
          fi
          echo "TAURI_SIGNING_PRIVATE_KEY present (length: $(printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | wc -c))"

          if [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is missing"
            exit 1
          fi
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD present (length: $(printf '%s' "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" | wc -c))"

      - name: Try writing key file and run tauri signer (best-effort)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p ~/.tauri
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > ~/.tauri/arbory.key
          chmod 600 ~/.tauri/arbory.key

          # Install Tauri CLI (best-effort) to try signer commands
          npm install -g @tauri-apps/cli@latest || true

          # Try to use tauri signer to verify the key (if CLI supports it on runner)
          if command -v tauri >/dev/null 2>&1; then
            if tauri signer verify -k ~/.tauri/arbory.key 2>/dev/null; then
              echo "Key verification succeeded"
            else
              echo "Key verification command available but verification failed or not supported on this runner"
            fi
          else
            echo "tauri CLI not available to run signer verify. As a fallback we'll try a dry frontend build."
            npm ci
            npm run build || echo "Frontend build failed (this is only a fallback check)."
          fi

      - name: Success marker
        run: echo "Secrets appear present and test steps ran (see previous step for details)."
